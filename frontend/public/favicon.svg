<svg xmlns="http://www.w3.org/2000/svg" viewBox="140 55 150 165" width="32" height="32">
  <defs>
    <linearGradient id="arrow-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="arrow-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="lens-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0.95"/>
    </radialGradient>
    <linearGradient id="handle-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="lens-clip">
      <circle cx="210" cy="125" r="48"/>
    </clipPath>
  </defs>

  <!-- Handle -->
  <g filter="url(#shadow)">
    <line x1="252" y1="167" x2="288" y2="203" stroke="url(#handle-grad)" stroke-width="20" stroke-linecap="round"/>
    <line x1="256" y1="171" x2="284" y2="199" stroke="#0f172a" stroke-width="6" stroke-linecap="round"/>
    <circle cx="252" cy="167" r="12" fill="#334155" stroke="#0f172a" stroke-width="3"/>
    <circle cx="252" cy="167" r="4" fill="#22d3ee"/>
  </g>

  <!-- Sync arrows -->
  <g filter="url(#shadow)">
    <g>
      <path d="M 150 125 A 60 60 0 0 1 261.96 95" fill="none" stroke="url(#arrow-grad-1)" stroke-width="12" stroke-linecap="round"/>
      <path d="M 261.96 95 L 236.96 75 L 244.96 95 L 236.96 115 Z" fill="#34d399" transform="rotate(120 261.96 95)"/>
    </g>
    <g transform="rotate(180 210 125)">
      <path d="M 150 125 A 60 60 0 0 1 261.96 95" fill="none" stroke="url(#arrow-grad-2)" stroke-width="12" stroke-linecap="round"/>
      <path d="M 261.96 95 L 236.96 75 L 244.96 95 L 236.96 115 Z" fill="#22d3ee" transform="rotate(120 261.96 95)"/>
    </g>
  </g>

  <!-- Lens -->
  <circle cx="210" cy="125" r="48" fill="url(#lens-grad)" stroke="#334155" stroke-width="2"/>
  <g clip-path="url(#lens-clip)" opacity="0.4">
    <line x1="162" y1="95"  x2="258" y2="95"  stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="162" y1="115" x2="258" y2="115" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="162" y1="135" x2="258" y2="135" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="162" y1="155" x2="258" y2="155" stroke="#475569" stroke-width="1" stroke-dasharray="3 3"/>
  </g>

  <!-- Network nodes -->
  <g stroke="#38bdf8" stroke-width="1.5" fill="#0f172a" opacity="0.8">
    <line x1="180" y1="95" x2="195" y2="85"/>
    <line x1="180" y1="95" x2="190" y2="105"/>
    <line x1="195" y1="85" x2="190" y2="105"/>
    <circle cx="180" cy="95" r="3"/>
    <circle cx="195" cy="85" r="3"/>
    <circle cx="190" cy="105" r="3"/>
  </g>

  <!-- Bar chart -->
  <rect x="182" y="120" width="12" height="35" rx="3" fill="url(#bar-grad)"/>
  <rect x="204" y="100" width="12" height="55" rx="3" fill="url(#bar-grad)"/>
  <rect x="226" y="75"  width="12" height="80" rx="3" fill="url(#bar-grad)"/>

  <!-- Trend line -->
  <path d="M 170 140 L 188 110 L 210 115 L 232 65" fill="none" stroke="#facc15" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="232" cy="65" r="5" fill="#facc15" stroke="#1e293b" stroke-width="2" filter="url(#glow)"/>

  <!-- Reticle ticks -->
  <path d="M 210 77 L 210 85 M 210 173 L 210 165 M 162 125 L 170 125 M 258 125 L 250 125" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
</svg>
